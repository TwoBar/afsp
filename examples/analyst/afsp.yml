# Example: Analyst agent — read-heavy, accesses shared datasets
# and its own workspace. No access to other agents' private spaces.

name: analyst
org_id: acme
role: analytics

view:
  # Private workspace
  - path: agents/analyst/**
    ops: [read, write]

  # Shared datasets — read-only
  - path: shared/datasets/**
    ops: [read]

  # Reports output — write results here for other agents to pick up via SGT
  - path: shared/reports/**
    ops: [read, write]
