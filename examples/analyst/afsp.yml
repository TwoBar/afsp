# Example: Analyst agent — read-only access to shared datasets,
# private workspace for outputs, no handoff zone access.

name: analyst
org_id: acme
role: analytics
runtime: python
entrypoint: analyze.py

view:
  # Private workspace
  - path: workspace/analyst/**
    ops: [read, write]

  # Shared datasets — read-only
  - path: datasets/public/**
    ops: [read]
