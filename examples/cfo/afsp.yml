# Example: CFO agent — private workspace + shared team data + company-wide assets.

name: cfo
org_id: acme
role: finance

view:
  # Private workspace — only this agent can see it
  - path: agents/cfo/**
    ops: [read, write]

  # Team-shared data — all finance agents can read
  - path: shared/finance/**
    ops: [read, write]

  # Company-wide datasets — read-only
  - path: shared/datasets/**
    ops: [read]

  # Additional paths can be granted dynamically via SGTs
