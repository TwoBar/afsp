# Example: CFO agent — finance workspace with read/write,
# read-only brand assets, and handoff zones for inter-agent file passing.

name: cfo
org_id: acme
role: finance
runtime: python
entrypoint: main.py

view:
  # Private workspace — full read/write access
  - path: workspace/finance/**
    ops: [read, write]

  # Inbound handoffs — read-only, files appear via SGT
  - path: workspace/handoffs/inbound/**
    ops: [read]

  # Outbound handoffs — write-once, produce artifacts for other agents
  - path: workspace/handoffs/outbound/**
    ops: [write]
    flags: [write_once]

  # Shared assets — read-only reference material
  - path: assets/brand/**
    ops: [read]
